<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>LinerSync Mythos V14</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#f8fbff;font-family:Arial,Helvetica,sans-serif}#appFrame{border:0;width:100%;height:100vh;display:block;background:#f8fbff}#loading{position:fixed;inset:0;display:grid;place-items:center;background:#f8fbff;color:#0d47a1;font-weight:900;z-index:5}</style>
</head>
<body>
<div id="loading">Loading Mythos V14 Field Focus...</div>
<iframe id="appFrame" src="./workflow-mythos-v12.html?v=v14harderase"></iframe>
<script>
const frame=document.getElementById('appFrame');
const loading=document.getElementById('loading');
function outerDoc(){return frame.contentDocument||frame.contentWindow?.document;}
function appDoc(){const od=outerDoc();const l1=od?.getElementById('appFrame');const d1=l1?.contentDocument||l1?.contentWindow?.document||od;const l2=d1?.getElementById('appFrame');return l2?.contentDocument||l2?.contentWindow?.document||d1;}
function status(msg){const d=appDoc();const s=d?.getElementById('status');if(s){s.textContent=msg;s.style.fontWeight='900';s.style.color='#0d47a1';}}
function tab(name){const d=appDoc();const b=Array.from(d?.querySelectorAll('.tab')||[]).find(x=>x.dataset.tab===name);if(b)b.click();}
function focus(id){const d=appDoc();const e=d?.getElementById(id);if(e){setTimeout(()=>{e.scrollIntoView({behavior:'smooth',block:'center'});e.focus();e.style.outline='5px solid #22c55e';setTimeout(()=>e.style.outline='',2500);},250);}}
function capture(type){const d=appDoc();tab('capture');setTimeout(()=>{const t=d?.getElementById('type');if(t){t.value=type;t.dispatchEvent(new Event('change',{bubbles:true}));}},250);}
function jump(text){const t=(text||'').replace('TAP TO FIX','').toLowerCase();if(t.includes('open workflow')){tab('capture');setTimeout(()=>appDoc()?.getElementById('openItems')?.scrollIntoView({behavior:'smooth',block:'center'}),250);status('Jumped to Open Items.');return;}if(t.includes('gps')){tab('home');setTimeout(()=>appDoc()?.getElementById('v10GpsPanel')?.scrollIntoView({behavior:'smooth',block:'center'}),250);status('Jumped to GPS Quality.');return;}if(t.includes('roll')){tab('setup');focus('roll');status('Jumped to Active Roll.');return;}if(t.includes('cell')||t.includes('pond')||t.includes('lagoon')){tab('setup');focus('cell');status('Jumped to Cell / Pond / Lagoon.');return;}if(t.includes('no logs')){tab('capture');status('Jumped to Capture.');return;}if(t.includes('repair type')){capture('Repair');setTimeout(()=>focus('repairType'),350);return;}if(t.includes('air')||t.includes('pressure')||t.includes('5 minute')){capture('Air Test');return;}if(t.includes('dt')||t.includes('destructive')||t.includes('spacing')){capture('Destructive Test');return;}if(t.includes('seam')){capture('Seam');return;}if(t.includes('panel')){capture('Panel');return;}tab('export');}
function addTap(el){const d=appDoc();if(!el||el.dataset.v14crit==='yes')return;el.dataset.v14crit='yes';el.style.cursor='pointer';el.style.position='relative';el.style.paddingRight='110px';const tag=d.createElement('span');tag.textContent='TAP TO FIX';tag.style.cssText='position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:1000;background:#0d47a1;color:#fff;border-radius:999px;padding:5px 8px;pointer-events:none;';el.appendChild(tag);el.addEventListener('click',()=>jump(el.textContent||''));}
function issueCardsBetween(header,nextHeaderText){const out=[];let n=header?.nextElementSibling;while(n){if(n.classList?.contains('cardTitle'))break;if(n.classList?.contains('issueItem'))out.push(n);out.push(...Array.from(n.querySelectorAll?.('.issueItem')||[]));n=n.nextElementSibling;}return out;}
function hardEraseHomeReview(){const d=appDoc();const headers=Array.from(d?.querySelectorAll('.cardTitle')||[]);const review=headers.find(h=>/^review later/i.test(h.textContent||''));if(!review)return;let n=review.nextElementSibling;while(n){const next=n.nextElementSibling;if(n.classList?.contains('cardTitle')||/Fast Workflow/i.test(n.textContent||''))break;n.remove();n=next;}review.remove();}
function cleanCritical(){const d=appDoc();const headers=Array.from(d?.querySelectorAll('.cardTitle')||[]);const crit=headers.find(h=>/critical now/i.test(h.textContent||''));if(!crit)return;const items=issueCardsBetween(crit);items.forEach((x,i)=>{if(i<3){x.style.display='';addTap(x);}else{x.remove();}});crit.textContent='Critical Now — Fix These First';}
function cleanSummary(){const d=appDoc();const next=d?.getElementById('nextAction');const c=Number((d?.getElementById('kCritical')?.textContent||'0').trim())||0;if(next){next.textContent=c>0?'Fix-now items are below. Review-later cleanup is stored for End-of-Day / Export.':'No critical issues. Keep logging QC.';next.className=c>0?'warnBox':'okBox';}}
function inject(){const d=appDoc();if(!d)return;loading.style.display='none';const title=d.querySelector('.title'),sub=d.querySelector('.sub');if(title)title.textContent='LinerSync Mythos V14';if(sub)sub.textContent='FIELD FOCUS — 3 CRITICAL ONLY';if(!d.getElementById('v14-hard-style')){const s=d.createElement('style');s.id='v14-hard-style';s.textContent='.issueItem:hover{filter:brightness(.98);transform:translateY(-1px)}';d.head.appendChild(s);}cleanSummary();cleanCritical();hardEraseHomeReview();}
frame.addEventListener('load',()=>{setTimeout(inject,1200);setTimeout(inject,2500);setInterval(inject,700);});
</script>
</body>
</html>
