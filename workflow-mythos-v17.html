<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>LinerSync Mythos V17</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#f8fbff;font-family:Arial,Helvetica,sans-serif}#appFrame{border:0;width:100%;height:100vh;display:block;background:#f8fbff}#loading{position:fixed;inset:0;display:grid;place-items:center;background:#f8fbff;color:#0d47a1;font-weight:900;z-index:5}</style>
</head>
<body>
<div id="loading">Loading Mythos V17 Stable Closeout...</div>
<iframe id="appFrame" src="./workflow-mythos-v6.html?v=v17stableflat"></iframe>
<script>
const frame=document.getElementById('appFrame');
const loading=document.getElementById('loading');
let lastGps=null;
const GPS_KEY='linersync-mythos-v17-last-gps';
const OPEN_KEY='linersync-mythos-v17-open-items';
const PACKS={Repair:['REPAIR PACK','#c62828','Patch / bead / repair point. GPS + repair type matter now. Photo waits for export review.'],'Air Test':['AIR TEST PACK','#0d47a1','Critical: 5 minute hold, start pressure, end pressure, and result.'],'Destructive Test':['DESTRUCTIVE TEST PACK','#7c2d12','Watch 500 ft spacing. Station / footage can be cleaned up at export.'],Panel:['PANEL PACK','#15803d','Track roll used, orientation / slope, station, length, and width.'],Seam:['SEAM PACK','#1976d2','Tie panel A/B, station, orientation, length, tech, and result.'],'Roll Use':['ROLL PACK','#1e3a8a','Set active roll so Mythos carries it forward.'],'Wedge Test':['WEDGE TEST PACK','#9333ea','Choose wedger and result. Failed test creates follow-up.'],'Extrusion Test':['EXTRUSION TEST PACK','#be123c','Choose welder and result. Failed test creates follow-up.']};
const OPEN_CHOICES=[['Start Repair','Repair'],['Start Panel','Panel'],['Start Seam','Seam'],['Start Air Test','Air Test'],['Start DT Patch','DT Patch'],['Start Retest','Retest'],['Start Other','Other']];
function d(){return frame.contentDocument||frame.contentWindow?.document;}
function w(){return frame.contentWindow;}
function q(sel){return d()?.querySelector(sel);}
function qa(sel){return Array.from(d()?.querySelectorAll(sel)||[]);}
function count(id){return Number((d()?.getElementById(id)?.textContent||'0').trim())||0;}
function status(msg,tone='info'){const doc=d();if(!doc)return;const s=doc.getElementById('status');if(s){s.textContent=msg;s.style.fontWeight='900';s.style.color=tone==='danger'?'#c62828':tone==='warn'?'#9a3412':tone==='good'?'#047857':'#0d47a1';}let toast=doc.getElementById('v17Toast');if(!toast){toast=doc.createElement('div');toast.id='v17Toast';toast.style.cssText='position:fixed;left:12px;right:12px;bottom:74px;z-index:17000;border:3px solid #9ec5ff;border-radius:18px;background:#fff;color:#0d47a1;padding:14px;font-weight:1000;box-shadow:0 8px 28px rgba(13,71,161,.25);display:none;text-align:center;';doc.body.appendChild(toast);}toast.textContent=msg;toast.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>toast.style.display='none',2600);}
function tab(name){const b=qa('.tab').find(x=>x.dataset.tab===name);if(b)b.click();}
function stableHeader(){const doc=d();if(!doc)return;const oldT=doc.querySelector('.title'),oldS=doc.querySelector('.sub');if(oldT)oldT.style.display='none';if(oldS)oldS.style.display='none';let h=doc.getElementById('v17StableHeader');if(!h){h=doc.createElement('div');h.id='v17StableHeader';h.style.cssText='text-align:center;color:#0d47a1;font-weight:1000;margin:0 0 6px 0;line-height:1.1;';h.innerHTML='<div style="font-size:22px;">LinerSync Mythos V17</div><div style="font-size:12px;color:#315b94;margin-top:3px;">STABLE CLOSEOUT BUILD</div>';const top=doc.querySelector('.top');if(top)top.insertBefore(h,top.firstChild);}}
function installStyle(){const doc=d();if(!doc||doc.getElementById('v17Style'))return;const s=doc.createElement('style');s.id='v17Style';s.textContent=`#v17GpsPanel,#v17CloseoutPanel,#v17HomeCloseoutCard{border:3px solid #9ec5ff;border-radius:20px;padding:14px;margin:8px 0;background:#fff;box-shadow:0 6px 18px rgba(13,71,161,.18)}#v17GpsGrid,#v17SummaryGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}#v17GpsGrid div,#v17SummaryGrid div{border:2px solid #9ec5ff;border-radius:14px;padding:10px;background:#f8fbff;font-weight:900}.v17Checklist{display:grid;gap:8px;margin-top:8px}.v17Check{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;border:2px solid #9ec5ff;border-radius:14px;padding:10px;background:#f8fbff;font-weight:900}.v17Check.good{border-color:#86efac;background:#ecfdf5;color:#047857}.v17Check.warn{border-color:#fdba74;background:#fff7ed;color:#9a3412}.v17Check.danger{border-color:#fda4af;background:#fff1f2;color:#c62828}#v17GetGps,#v17OpenCloseout,#v17RefreshEod{width:100%;margin-top:8px;min-height:54px;border:2px solid #86efac;border-radius:16px;background:#15803d;color:#fff;font-weight:1000}#v17PackBanner{border:3px solid #0d47a1;border-radius:20px;padding:14px;margin:8px 0 12px;background:#fff;box-shadow:0 6px 18px rgba(13,71,161,.22)}#v17PackTitle{font-size:24px;font-weight:1000;margin-bottom:6px}#v17PackText{font-size:15px;font-weight:900;color:#0f172a}#v17PackStrip{height:8px;border-radius:999px;margin-top:10px}.issueItem:hover{filter:brightness(.98);transform:translateY(-1px)}.issueItem{transition:transform .12s ease, filter .12s ease}#v17ExportPack{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}#v17ExportPack button{min-height:54px;border:2px solid #9ec5ff;border-radius:16px;background:#fff;color:#0d47a1;font-weight:1000}#v17ExportPack .primary{background:#1976d2;color:#fff}@media(max-width:600px){#v17GpsGrid,#v17SummaryGrid,#v17ExportPack{grid-template-columns:1fr}}`;doc.head.appendChild(s);}
function gpsLevel(acc){if(acc==null)return['No GPS fix yet','#c62828','danger'];if(acc<=10)return['Good GPS','#15803d','good'];if(acc<=30)return['Usable GPS','#d97706','warn'];return['Poor GPS','#c62828','danger'];}
function updateGpsPanel(){const doc=d();try{lastGps=JSON.parse(localStorage.getItem(GPS_KEY)||'null')}catch(e){lastGps=null}const st=doc?.getElementById('v17GpsStatus');if(!st)return;if(!lastGps){doc.getElementById('v17GpsStatus').textContent='No GPS fix yet';doc.getElementById('v17GpsSource').textContent='Source: none';doc.getElementById('v17GpsAccuracy').textContent='Accuracy: missing';doc.getElementById('v17GpsTime').textContent='Last fix: none';doc.getElementById('v17GpsCoords').textContent='Coordinates: missing';doc.getElementById('v17GpsStrip').style.background='#c62828';return;}const [label,color]=gpsLevel(lastGps.accuracy);doc.getElementById('v17GpsStatus').textContent=label;doc.getElementById('v17GpsSource').textContent='Source: '+(lastGps.source||'phone');doc.getElementById('v17GpsAccuracy').textContent='Accuracy: ±'+Math.round(lastGps.accuracy||0)+' m';doc.getElementById('v17GpsTime').textContent='Last fix: '+new Date(lastGps.timestamp).toLocaleTimeString([], {hour12:true});doc.getElementById('v17GpsCoords').textContent='Coordinates: '+Number(lastGps.lat).toFixed(6)+', '+Number(lastGps.lng).toFixed(6);doc.getElementById('v17GpsStrip').style.background=color;}
function getGps(){const win=w();if(!win?.navigator?.geolocation){status('GPS not supported.','danger');return;}status('Getting GPS fix. Hold still.','info');win.navigator.geolocation.getCurrentPosition(pos=>{lastGps={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,source:'phone',timestamp:new Date().toISOString()};localStorage.setItem(GPS_KEY,JSON.stringify(lastGps));try{win.gps=lastGps;}catch(e){}updateGpsPanel();const [label,,tone]=gpsLevel(lastGps.accuracy);status(label+' — ±'+Math.round(lastGps.accuracy||0)+' m',tone);},()=>status('GPS blocked or unavailable. Allow browser location and retry.','danger'),{enableHighAccuracy:true,maximumAge:0,timeout:15000});}
function gpsPanel(){const doc=d();const home=doc?.getElementById('home');if(!home)return;let p=doc.getElementById('v17GpsPanel');if(!p){p=doc.createElement('div');p.id='v17GpsPanel';p.innerHTML='<b style="font-size:20px;color:#0d47a1">GPS Quality</b><div id="v17GpsGrid"><div id="v17GpsStatus">No GPS fix yet</div><div id="v17GpsSource">Source: none</div><div id="v17GpsAccuracy">Accuracy: missing</div><div id="v17GpsTime">Last fix: none</div><div id="v17GpsCoords" style="grid-column:1/-1">Coordinates: missing</div></div><button id="v17GetGps">Get GPS Fix</button><div id="v17GpsStrip" style="height:8px;border-radius:999px;background:#c62828;margin-top:10px"></div>';home.insertBefore(p,home.firstChild);}updateGpsPanel();const btn=doc.getElementById('v17GetGps');if(btn&&!btn.dataset.v17){btn.dataset.v17='yes';btn.onclick=getGps;}const topBtn=doc.getElementById('gpsBtn');if(topBtn&&!topBtn.dataset.v17){topBtn.dataset.v17='yes';topBtn.onclick=e=>{e.preventDefault();e.stopImmediatePropagation();getGps();};}}
function packBanner(){const doc=d();const card=doc?.querySelector('#capture .card');if(!card)return;if(!doc.getElementById('v17PackBanner')){const b=doc.createElement('div');b.id='v17PackBanner';b.innerHTML='<div id="v17PackTitle"></div><div id="v17PackText"></div><div id="v17PackStrip"></div>';card.insertBefore(b,card.firstChild);}const type=doc.getElementById('type');if(type&&!type.dataset.v17pack){type.dataset.v17pack='yes';type.addEventListener('change',updatePack);}updatePack();}
function updatePack(){const doc=d();const type=doc?.getElementById('type')?.value||'Repair';const p=PACKS[type]||PACKS.Repair;const b=doc.getElementById('v17PackBanner');if(!b)return;b.style.borderColor=p[1];doc.getElementById('v17PackTitle').textContent=p[0];doc.getElementById('v17PackTitle').style.color=p[1];doc.getElementById('v17PackText').textContent=p[2];doc.getElementById('v17PackStrip').style.background=p[1];}
function openItems(){try{return JSON.parse(localStorage.getItem(OPEN_KEY)||'[]')}catch(e){return[]}}
function saveOpen(items){localStorage.setItem(OPEN_KEY,JSON.stringify(items));}
function renderOpenItems(){const doc=d();const box=doc?.getElementById('openItems');if(!box)return;const items=openItems();if(!items.length){box.innerHTML='<div class="item">No open items</div>';return;}box.innerHTML='';items.slice().reverse().forEach(i=>{const e=doc.createElement('div');e.className='item';e.innerHTML='<b>'+i.type+' — '+i.number+'</b><div class="itemMeta">Started '+new Date(i.startedAt).toLocaleString([], {hour12:true})+' | Status OPEN</div>';box.appendChild(e);});}
function startOpen(type){const items=openItems();const prefix=type==='Repair'?'R':type==='Panel'?'P':type==='Seam'?'S':type==='Air Test'?'AT':type==='DT Patch'?'DTP':type==='Retest'?'RT':'OPEN';const number=prefix+'-OPEN-'+String(items.length+1).padStart(3,'0');items.push({id:Date.now(),type,number,startedAt:new Date().toISOString(),gps:lastGps,status:'OPEN'});saveOpen(items);renderOpenItems();status('Started open item: '+type+' '+number,'good');}
function picker(){const doc=d();if(!doc||doc.getElementById('v17Picker'))return;const o=doc.createElement('div');o.id='v17Picker';o.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:17000;display:none;place-items:center;padding:18px;';o.innerHTML='<div style="width:min(620px,100%);background:#fff;border:3px solid #9ec5ff;border-radius:24px;padding:16px"><div style="font-size:22px;font-weight:1000;color:#0d47a1">Start Open Item</div><div id="v17Choices" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px"></div><button id="v17Cancel" style="margin-top:12px;width:100%;min-height:52px;border:2px solid #9ec5ff;border-radius:16px;background:#fff;color:#0d47a1;font-weight:1000">Cancel</button></div>';doc.body.appendChild(o);const c=o.querySelector('#v17Choices');OPEN_CHOICES.forEach(x=>{const btn=doc.createElement('button');btn.textContent=x[0];btn.style.cssText='min-height:56px;border:2px solid #9ec5ff;border-radius:16px;background:#1976d2;color:#fff;font-weight:1000;';btn.onclick=()=>{o.style.display='none';startOpen(x[1]);};c.appendChild(btn);});o.querySelector('#v17Cancel').onclick=()=>{o.style.display='none';status('Open item start cancelled.','info');};}
function finishOpen(){const items=openItems();if(!items.length){status('No open item to finish. Start one first, or keep logging.','info');return;}const item=items.pop();saveOpen(items);const doc=d();tab('capture');setTimeout(()=>{const map=item.type==='DT Patch'?'Repair':item.type==='Retest'?'Wedge Test':item.type==='Other'?'Repair':item.type;const type=doc.getElementById('type');if(type){type.value=map;type.dispatchEvent(new Event('change',{bubbles:true}));}const num=doc.getElementById('number');if(num)num.value=item.number;const notes=doc.getElementById('notes');if(notes)notes.value=(notes.value?notes.value+'\n':'')+'Finished open item: '+item.type+'.';updatePack();renderOpenItems();status('Loaded '+item.type+' '+item.number+' into Capture.','good');},250);}
function wireOpen(){const doc=d();const start=doc?.getElementById('startItem'),finish=doc?.getElementById('finishItem');if(start&&!start.dataset.v17){start.dataset.v17='yes';start.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();doc.getElementById('v17Picker').style.display='grid';},true);}if(finish&&!finish.dataset.v17){finish.dataset.v17='yes';finish.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();finishOpen();},true);}picker();renderOpenItems();}
function focusField(id){const e=d()?.getElementById(id);if(e){setTimeout(()=>{e.scrollIntoView({behavior:'smooth',block:'center'});e.focus();e.style.outline='5px solid #22c55e';setTimeout(()=>e.style.outline='',2500);},250);}}
function jump(text){const t=(text||'').replace('TAP TO FIX','').toLowerCase();if(t.includes('open workflow')){tab('capture');setTimeout(()=>d()?.getElementById('openItems')?.scrollIntoView({behavior:'smooth',block:'center'}),250);return;}if(t.includes('roll')){tab('setup');focusField('roll');return;}if(t.includes('cell')||t.includes('pond')||t.includes('lagoon')){tab('setup');focusField('cell');return;}if(t.includes('no logs')){tab('capture');return;}if(t.includes('gps')){tab('home');setTimeout(()=>d()?.getElementById('v17GpsPanel')?.scrollIntoView({behavior:'smooth',block:'center'}),250);return;}tab('capture');}
function cleanHome(){const doc=d();if(!doc)return;const next=doc.getElementById('nextAction');const critical=count('kCritical');if(next){next.textContent=critical>0?'Fix-now items are below. Review-later cleanup is stored for End-of-Day / Export.':'No critical issues. Keep logging QC.';next.className=critical>0?'warnBox':'okBox';}const headers=qa('.cardTitle');const review=headers.find(h=>/^review later/i.test(h.textContent||''));if(review){let n=review.nextElementSibling;while(n){const nx=n.nextElementSibling;if(n.classList?.contains('cardTitle')||/Fast Workflow/i.test(n.textContent||''))break;n.remove();n=nx;}review.remove();}const crit=headers.find(h=>/critical now/i.test(h.textContent||''));if(crit){crit.textContent='Critical Now — Fix These First';let items=[];let n=crit.nextElementSibling;while(n&&!n.classList?.contains('cardTitle')){if(n.classList?.contains('issueItem'))items.push(n);items.push(...Array.from(n.querySelectorAll?.('.issueItem')||[]));n=n.nextElementSibling;}items.forEach((x,i)=>{if(i>2)x.remove();else if(!x.dataset.v17crit){x.dataset.v17crit='yes';x.style.cursor='pointer';x.style.position='relative';x.style.paddingRight='110px';const tag=doc.createElement('span');tag.textContent='TAP TO FIX';tag.style.cssText='position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:1000;background:#0d47a1;color:#fff;border-radius:999px;padding:5px 8px;pointer-events:none;';x.appendChild(tag);x.addEventListener('click',()=>jump(x.textContent||''));}});}}
function gpsText(){const gps=q('#v17GpsStatus')?.textContent||'No GPS fix yet';const acc=q('#v17GpsAccuracy')?.textContent||'Accuracy: missing';return gps+' | '+acc;}
function latestLog(){const first=q('#logsList .item')||q('#homeLogs .item');return(first?.textContent||'No logs yet').replace(/\s+/g,' ').trim().slice(0,120);}
function reviewItems(){const ex=q('#exportStatus');if(!ex)return[];return Array.from(ex.querySelectorAll('li')).map(x=>(x.textContent||'').trim()).filter(t=>/review|photo|cell|pond|lagoon|roll|station|footage|technician|override|no logs|missing/i.test(t)).slice(0,12);}
function check(label,ok,warn=false){const cls=ok?'good':warn?'warn':'danger';const icon=ok?'✓':warn?'!':'✕';return `<div class="v17Check ${cls}"><div style="font-size:18px;font-weight:1000">${icon}</div><div>${label}</div></div>`;}
function state(){const critical=count('kCritical'),review=count('kReview'),logs=count('kLogs'),open=count('kOpen');const badge=qa('.badge').map(x=>x.textContent).join(' | ');const gpsOk=!/no gps|missing/i.test(gpsText());const cellOk=!/Cell blank/i.test(badge);const rollOk=!/Roll blank/i.test(badge);let statusText='Ready to Export',tone='good';if(critical>0||open>0){statusText='Not Ready — Critical Items Still Open';tone='danger';}else if(review>0||!gpsOk||!cellOk||!rollOk||logs===0){statusText='Needs Review Before Export';tone='warn';}return{critical,review,logs,open,gpsOk,cellOk,rollOk,statusText,tone};}
function closeout(){const doc=d();const exp=doc?.getElementById('export');if(!exp)return;let p=doc.getElementById('v17CloseoutPanel');if(!p){p=doc.createElement('div');p.id='v17CloseoutPanel';p.innerHTML='<div class="cardTitle">End-of-Day Closeout</div><div id="v17CloseoutStatus"></div><div class="cardTitle" style="margin-top:10px">Closeout Checklist</div><div id="v17Checklist" class="v17Checklist"></div><div class="cardTitle" style="margin-top:10px">Field Summary</div><div id="v17SummaryGrid"></div><div class="cardTitle" style="margin-top:10px">One-Tap Export Pack</div><div id="v17ExportPack"><button data-export="report" class="primary">Daily Report</button><button data-export="csv">CSV</button><button data-export="kml">KML</button><button data-export="json">JSON Backup</button></div><div class="cardTitle" style="margin-top:10px">Review Later Cleanup</div><div id="v17ReviewList"></div>';exp.insertBefore(p,exp.firstChild);}updateCloseout();}
function updateCloseout(){const doc=d();const panel=doc?.getElementById('v17CloseoutPanel');if(!panel)return;const s=state();const statusBox=doc.getElementById('v17CloseoutStatus');if(statusBox){statusBox.textContent=s.statusText;statusBox.style.cssText='border-radius:16px;padding:12px;font-weight:1000;margin:8px 0;border:3px solid '+(s.tone==='danger'?'#fda4af':s.tone==='warn'?'#fdba74':'#86efac')+';background:'+(s.tone==='danger'?'#fff1f2':s.tone==='warn'?'#fff7ed':'#ecfdf5')+';color:'+(s.tone==='danger'?'#c62828':s.tone==='warn'?'#9a3412':'#047857');}const checklist=doc.getElementById('v17Checklist');if(checklist){checklist.innerHTML=[check('GPS captured: '+gpsText(),s.gpsOk,true),check('Project / cell filled',s.cellOk,true),check('Active roll filled',s.rollOk,true),check('Critical issues cleared',s.critical===0,false),check('Open items finished',s.open===0,false),check('Logs saved: '+s.logs,s.logs>0,true),check('Review-later items checked: '+s.review,s.review===0,true)].join('');}const grid=doc.getElementById('v17SummaryGrid');if(grid){grid.innerHTML='<div>Total logs: '+s.logs+'</div><div>Open items: '+s.open+'</div><div>Critical: '+s.critical+'</div><div>Review Later: '+s.review+'</div><div style="grid-column:1/-1">GPS: '+gpsText()+'</div><div style="grid-column:1/-1">Last log: '+latestLog()+'</div>';}const list=doc.getElementById('v17ReviewList');if(list){const items=reviewItems();list.innerHTML=items.length?items.map((t,i)=>'<div class="item"><b>'+(i+1)+'. Review Later</b><div class="itemMeta">'+t+'</div></div>').join(''):'<div class="item"><b>No review-later cleanup listed.</b><div class="itemMeta">Run final export check before leaving site.</div></div>';}qa('#v17ExportPack button').forEach(btn=>{if(btn.dataset.v17)return;btn.dataset.v17='yes';btn.onclick=()=>{const real=d()?.getElementById({report:'report',csv:'csv',kml:'kml',json:'json'}[btn.dataset.export]);if(real){real.click();status('Export started: '+btn.dataset.export.toUpperCase(),'good');}}});}
function homeCloseout(){const doc=d();const home=doc?.getElementById('home');if(!home)return;let card=doc.getElementById('v17HomeCloseoutCard');if(!card){card=doc.createElement('div');card.id='v17HomeCloseoutCard';card.className='card';card.innerHTML='<div class="cardTitle">End-of-Day Closeout</div><div id="v17HomeCloseoutText" class="okBox"></div><button id="v17OpenCloseout" class="secondary" style="width:100%;margin-top:8px;font-weight:1000;">Open Closeout</button>';const fast=Array.from(home.querySelectorAll('.card')).find(c=>/Fast Workflow/i.test(c.textContent||''));home.insertBefore(card,fast||null);}const s=state();const txt=doc.getElementById('v17HomeCloseoutText');if(txt){txt.textContent=s.statusText;txt.className=s.tone==='danger'?'redBox':s.tone==='warn'?'warnBox':'okBox';}const btn=doc.getElementById('v17OpenCloseout');if(btn&&!btn.dataset.v17){btn.dataset.v17='yes';btn.onclick=()=>{tab('export');setTimeout(()=>d()?.getElementById('v17CloseoutPanel')?.scrollIntoView({behavior:'smooth',block:'start'}),300);status('Opened End-of-Day Closeout.','info');};}}
function inject(){const doc=d(),win=w();if(!doc||!win)return;loading.style.display='none';stableHeader();installStyle();gpsPanel();packBanner();wireOpen();cleanHome();closeout();homeCloseout();updateCloseout();if(!win.__v17Alert){win.__v17Alert=true;win.alert=m=>status(String(m||'Notice.'),'info');}}
frame.addEventListener('load',()=>{setTimeout(inject,800);setTimeout(inject,1700);setInterval(inject,900);});
</script>
</body>
</html>
