<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>LinerSync Mythos V17</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#f8fbff;font-family:Arial,Helvetica,sans-serif}#appFrame{border:0;width:100%;height:100vh;display:block;background:#f8fbff}#loading{position:fixed;inset:0;display:grid;place-items:center;background:#f8fbff;color:#0d47a1;font-weight:900;z-index:5}</style>
</head>
<body>
<div id="loading">Loading Mythos V17 End-of-Day Closeout...</div>
<iframe id="appFrame" src="./workflow-mythos-v16.html?v=v17closeout"></iframe>
<script>
const frame=document.getElementById('appFrame');
const loading=document.getElementById('loading');
function outerDoc(){return frame.contentDocument||frame.contentWindow?.document;}
function appDoc(){const od=outerDoc();const l1=od?.getElementById('appFrame');return l1?.contentDocument||l1?.contentWindow?.document||od;}
function appWin(){const od=outerDoc();const l1=od?.getElementById('appFrame');return l1?.contentWindow||frame.contentWindow;}
function d(){return appDoc();}
function q(sel){return d()?.querySelector(sel);}
function qa(sel){return Array.from(d()?.querySelectorAll(sel)||[]);}
function count(id){return Number((d()?.getElementById(id)?.textContent||'0').trim())||0;}
function status(msg,tone='info'){const doc=d();if(!doc)return;const s=doc.getElementById('status');if(s){s.textContent=msg;s.style.fontWeight='900';s.style.color=tone==='danger'?'#c62828':tone==='warn'?'#9a3412':tone==='good'?'#047857':'#0d47a1';}let toast=doc.getElementById('v17Toast');if(!toast){toast=doc.createElement('div');toast.id='v17Toast';toast.style.cssText='position:fixed;left:12px;right:12px;bottom:74px;z-index:17000;border:3px solid #9ec5ff;border-radius:18px;background:#fff;color:#0d47a1;padding:14px;font-weight:1000;box-shadow:0 8px 28px rgba(13,71,161,.25);display:none;text-align:center;';doc.body.appendChild(toast);}toast.textContent=msg;toast.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>toast.style.display='none',2600);}
function tab(name){const b=qa('.tab').find(x=>x.dataset.tab===name);if(b)b.click();}
function stableHeader(){const doc=d();if(!doc)return;const old=doc.getElementById('v16StableHeader');if(old)old.remove();const oldT=doc.querySelector('.title'),oldS=doc.querySelector('.sub');if(oldT)oldT.style.display='none';if(oldS)oldS.style.display='none';let h=doc.getElementById('v17StableHeader');if(!h){h=doc.createElement('div');h.id='v17StableHeader';h.style.cssText='text-align:center;color:#0d47a1;font-weight:1000;margin:0 0 6px 0;line-height:1.1;';h.innerHTML='<div style="font-size:22px;">LinerSync Mythos V17</div><div style="font-size:12px;color:#315b94;margin-top:3px;">END-OF-DAY CLOSEOUT</div>';const top=doc.querySelector('.top');if(top)top.insertBefore(h,top.firstChild);}}
function installStyle(){const doc=d();if(!doc||doc.getElementById('v17Style'))return;const s=doc.createElement('style');s.id='v17Style';s.textContent=`
#v17CloseoutPanel{border:3px solid #0d47a1;border-radius:20px;padding:14px;margin:8px 0;background:#fff;box-shadow:0 6px 18px rgba(13,71,161,.18)}
#v17CloseoutStatus{border-radius:16px;padding:12px;font-weight:1000;margin:8px 0;border:3px solid #9ec5ff;background:#eff6ff;color:#0d47a1}
.v17Checklist{display:grid;gap:8px;margin-top:8px}.v17Check{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;border:2px solid #9ec5ff;border-radius:14px;padding:10px;background:#f8fbff;font-weight:900}.v17Check.good{border-color:#86efac;background:#ecfdf5;color:#047857}.v17Check.warn{border-color:#fdba74;background:#fff7ed;color:#9a3412}.v17Check.danger{border-color:#fda4af;background:#fff1f2;color:#c62828}.v17Icon{font-size:18px;font-weight:1000}
#v17SummaryGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}#v17SummaryGrid div{border:2px solid #9ec5ff;border-radius:14px;padding:10px;background:#f8fbff;font-weight:900;color:#0f172a}
#v17ExportPack{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}#v17ExportPack button{min-height:54px;border:2px solid #9ec5ff;border-radius:16px;background:#fff;color:#0d47a1;font-weight:1000}#v17ExportPack .primary{background:#1976d2;color:#fff}
@media(max-width:600px){#v17SummaryGrid,#v17ExportPack{grid-template-columns:1fr}}
`;doc.head.appendChild(s);}
function getGpsText(){const gps=q('#v16GpsStatus')?.textContent||q('#v10GpsStatus')?.textContent||'No GPS fix yet';const acc=q('#v16GpsAccuracy')?.textContent||q('#v10GpsAccuracy')?.textContent||'Accuracy: missing';return gps+' | '+acc;}
function latestLogText(){const first=q('#logsList .item')||q('#homeLogs .item');return (first?.textContent||'No logs yet').replace(/\s+/g,' ').trim().slice(0,120);}
function exportReviewItems(){const ex=q('#exportStatus');if(!ex)return[];return Array.from(ex.querySelectorAll('li')).map(x=>(x.textContent||'').trim()).filter(Boolean).filter(t=>/review|photo|cell|pond|lagoon|roll|station|footage|technician|override|no logs|missing/i.test(t)).slice(0,12);}
function check(label,ok,warn=false){const cls=ok?'good':warn?'warn':'danger';const icon=ok?'✓':warn?'!':'✕';return `<div class="v17Check ${cls}"><div class="v17Icon">${icon}</div><div>${label}</div></div>`;}
function closeoutState(){const critical=count('kCritical'),review=count('kReview'),logs=count('kLogs'),open=count('kOpen');let gpsOk=!/no gps|missing/i.test(getGpsText());let cellOk=!/Cell blank/i.test(qa('.badge').map(x=>x.textContent).join(' | '));let rollOk=!/Roll blank/i.test(qa('.badge').map(x=>x.textContent).join(' | '));let statusText='Ready to Export', tone='good';if(critical>0||open>0){statusText='Not Ready — Critical Items Still Open';tone='danger';}else if(review>0||!gpsOk||!cellOk||!rollOk||logs===0){statusText='Needs Review Before Export';tone='warn';}return{critical,review,logs,open,gpsOk,cellOk,rollOk,statusText,tone};}
function addCloseoutPanel(){const doc=d();const exp=doc?.getElementById('export');if(!exp)return;let panel=doc.getElementById('v17CloseoutPanel');if(!panel){panel=doc.createElement('div');panel.id='v17CloseoutPanel';panel.innerHTML='<div class="cardTitle">End-of-Day Closeout</div><div id="v17CloseoutStatus"></div><div class="cardTitle" style="margin-top:10px">Closeout Checklist</div><div id="v17Checklist" class="v17Checklist"></div><div class="cardTitle" style="margin-top:10px">Field Summary</div><div id="v17SummaryGrid"></div><div class="cardTitle" style="margin-top:10px">One-Tap Export Pack</div><div id="v17ExportPack"><button data-export="report" class="primary">Daily Report</button><button data-export="csv">CSV</button><button data-export="kml">KML</button><button data-export="json">JSON Backup</button></div><div class="cardTitle" style="margin-top:10px">Review Later Cleanup</div><div id="v17ReviewList"></div>';exp.insertBefore(panel,exp.firstChild);}updateCloseoutPanel();}
function updateCloseoutPanel(){const doc=d();const panel=doc?.getElementById('v17CloseoutPanel');if(!panel)return;const s=closeoutState();const statusBox=doc.getElementById('v17CloseoutStatus');if(statusBox){statusBox.textContent=s.statusText;statusBox.style.borderColor=s.tone==='danger'?'#fda4af':s.tone==='warn'?'#fdba74':'#86efac';statusBox.style.background=s.tone==='danger'?'#fff1f2':s.tone==='warn'?'#fff7ed':'#ecfdf5';statusBox.style.color=s.tone==='danger'?'#c62828':s.tone==='warn'?'#9a3412':'#047857';}
const checklist=doc.getElementById('v17Checklist');if(checklist){checklist.innerHTML=[check('GPS captured: '+getGpsText(),s.gpsOk,true),check('Project / cell filled',s.cellOk,true),check('Active roll filled',s.rollOk,true),check('Critical issues cleared',s.critical===0,false),check('Open items finished',s.open===0,false),check('Logs saved: '+s.logs,s.logs>0,true),check('Review-later items checked: '+s.review,s.review===0,true)].join('');}
const grid=doc.getElementById('v17SummaryGrid');if(grid){grid.innerHTML='<div>Total logs: '+s.logs+'</div><div>Open items: '+s.open+'</div><div>Critical: '+s.critical+'</div><div>Review Later: '+s.review+'</div><div style="grid-column:1/-1">GPS: '+getGpsText()+'</div><div style="grid-column:1/-1">Last log: '+latestLogText()+'</div>';}
const list=doc.getElementById('v17ReviewList');if(list){const items=exportReviewItems();list.innerHTML=items.length?items.map((t,i)=>'<div class="item"><b>'+(i+1)+'. Review Later</b><div class="itemMeta">'+t+'</div></div>').join(''):'<div class="item"><b>No review-later cleanup listed.</b><div class="itemMeta">Run final export check before leaving site.</div></div>';}
qa('#v17ExportPack button').forEach(btn=>{if(btn.dataset.v17)return;btn.dataset.v17='yes';btn.onclick=()=>triggerExport(btn.dataset.export);});}
function triggerExport(kind){const map={report:'report',csv:'csv',kml:'kml',json:'json'};const id=map[kind];const btn=d()?.getElementById(id);if(btn){btn.click();status('Export started: '+kind.toUpperCase(),'good');}else status('Export button not found: '+kind,'warn');}
function addHomeCloseoutButton(){const doc=d();const home=doc?.getElementById('home');if(!home)return;let card=doc.getElementById('v17HomeCloseoutCard');if(!card){card=doc.createElement('div');card.id='v17HomeCloseoutCard';card.className='card';card.innerHTML='<div class="cardTitle">End-of-Day Closeout</div><div id="v17HomeCloseoutText" class="okBox"></div><button id="v17OpenCloseout" class="secondary" style="width:100%;margin-top:8px;font-weight:1000;">Open Closeout</button>';const fast=Array.from(home.querySelectorAll('.card')).find(c=>/Fast Workflow/i.test(c.textContent||''));home.insertBefore(card,fast||null);}const s=closeoutState();const txt=doc.getElementById('v17HomeCloseoutText');if(txt){txt.textContent=s.statusText;txt.className=s.tone==='danger'?'redBox':s.tone==='warn'?'warnBox':'okBox';}const btn=doc.getElementById('v17OpenCloseout');if(btn&&!btn.dataset.v17){btn.dataset.v17='yes';btn.onclick=()=>{tab('export');setTimeout(()=>{const p=d()?.getElementById('v17CloseoutPanel');if(p)p.scrollIntoView({behavior:'smooth',block:'start'});},300);status('Opened End-of-Day Closeout.','info');};}}
function inject(){const doc=d(),w=appWin();if(!doc||!w)return;loading.style.display='none';stableHeader();installStyle();addCloseoutPanel();addHomeCloseoutButton();updateCloseoutPanel();if(!w.__v17Alert){w.__v17Alert=true;w.alert=m=>status(String(m||'Notice.'),'info');}}
frame.addEventListener('load',()=>{setTimeout(inject,900);setTimeout(inject,1800);setInterval(inject,1100);});
</script>
</body>
</html>
