<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>LinerSync Mythos V16</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#f8fbff;font-family:Arial,Helvetica,sans-serif}
#appFrame{border:0;width:100%;height:100vh;display:block;background:#f8fbff}
#loading{position:fixed;inset:0;display:grid;place-items:center;background:#f8fbff;color:#0d47a1;font-weight:900;z-index:5}
</style>
</head>
<body>
<div id="loading">Loading Mythos V16 Flat Build...</div>
<iframe id="appFrame" src="./workflow-mythos-v6.html?v=v16flat"></iframe>
<script>
const frame=document.getElementById('appFrame');
const loading=document.getElementById('loading');
let lastGps=null;
const OPEN_KEY='linersync-mythos-v16-open-items';
const GPS_KEY='linersync-mythos-v16-last-gps';
const PACKS={
 'Repair':['REPAIR PACK','#c62828','Patch / bead / repair point. Required now: GPS + repair type. Photo waits for export review.'],
 'Air Test':['AIR TEST PACK','#0d47a1','Critical: 5 minute hold, start pressure, end pressure, and result.'],
 'Destructive Test':['DESTRUCTIVE TEST PACK','#7c2d12','Watch 500 ft spacing. Station / footage can be cleaned up at export.'],
 'Panel':['PANEL PACK','#15803d','Track roll used, orientation / slope, station, length, and width.'],
 'Seam':['SEAM PACK','#1976d2','Tie panel A/B, station, orientation, length, tech, and result.'],
 'Roll Use':['ROLL PACK','#1e3a8a','Set active roll so Mythos carries it forward.'],
 'Wedge Test':['WEDGE TEST PACK','#9333ea','Choose wedger and result. Failed test creates follow-up.'],
 'Extrusion Test':['EXTRUSION TEST PACK','#be123c','Choose welder and result. Failed test creates follow-up.']
};
const OPEN_CHOICES=[['Start Repair','Repair'],['Start Panel','Panel'],['Start Seam','Seam'],['Start Air Test','Air Test'],['Start DT Patch','DT Patch'],['Start Retest','Retest'],['Start Other','Other']];
function doc(){return frame.contentDocument||frame.contentWindow?.document;}
function win(){return frame.contentWindow;}
function q(sel){return doc()?.querySelector(sel);}
function qa(sel){return Array.from(doc()?.querySelectorAll(sel)||[]);}
function status(msg,tone='info'){
 const d=doc(); if(!d)return;
 const s=d.getElementById('status');
 if(s){s.textContent=msg;s.style.fontWeight='900';s.style.color=tone==='danger'?'#c62828':tone==='warn'?'#9a3412':tone==='good'?'#047857':'#0d47a1';}
 let toast=d.getElementById('v16Toast');
 if(!toast){toast=d.createElement('div');toast.id='v16Toast';toast.style.cssText='position:fixed;left:12px;right:12px;bottom:74px;z-index:16000;border:3px solid #9ec5ff;border-radius:18px;background:#fff;color:#0d47a1;padding:14px;font-weight:1000;box-shadow:0 8px 28px rgba(13,71,161,.25);display:none;text-align:center;';d.body.appendChild(toast);}
 toast.textContent=msg;toast.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>toast.style.display='none',2600);
}
function tab(name){const b=qa('.tab').find(x=>x.dataset.tab===name);if(b)b.click();}
function count(id){return Number((doc()?.getElementById(id)?.textContent||'0').trim())||0;}
function stableHeader(){const d=doc();if(!d)return;const oldT=d.querySelector('.title'),oldS=d.querySelector('.sub');if(oldT)oldT.style.display='none';if(oldS)oldS.style.display='none';let h=d.getElementById('v16StableHeader');if(!h){h=d.createElement('div');h.id='v16StableHeader';h.style.cssText='text-align:center;color:#0d47a1;font-weight:1000;margin:0 0 6px 0;line-height:1.1;';h.innerHTML='<div style="font-size:22px;">LinerSync Mythos V16</div><div style="font-size:12px;color:#315b94;margin-top:3px;">FLAT BUILD — NO HEADER FLICKER</div>';const top=d.querySelector('.top');if(top)top.insertBefore(h,top.firstChild);} }
function installStyle(){const d=doc();if(!d||d.getElementById('v16Style'))return;const s=d.createElement('style');s.id='v16Style';s.textContent=`
#v16GpsPanel,#v16HomeEodCard,#v16EodPanel{border:3px solid #9ec5ff;border-radius:20px;padding:14px;margin:8px 0;background:#fff;box-shadow:0 6px 18px rgba(13,71,161,.18)}
#v16GpsGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}#v16GpsGrid div{border:2px solid #9ec5ff;border-radius:14px;padding:10px;font-weight:900;background:#f8fbff}
#v16GetGps,#v16OpenEod,#v16RefreshEod{width:100%;margin-top:8px;min-height:54px;border:2px solid #86efac;border-radius:16px;background:#15803d;color:#fff;font-weight:1000}
#v16PackBanner{border:3px solid #0d47a1;border-radius:20px;padding:14px;margin:8px 0 12px;background:#fff;box-shadow:0 6px 18px rgba(13,71,161,.22)}#v16PackTitle{font-size:24px;font-weight:1000;margin-bottom:6px}#v16PackText{font-size:15px;font-weight:900;color:#0f172a}#v16PackStrip{height:8px;border-radius:999px;margin-top:10px}
.issueItem:hover{filter:brightness(.98);transform:translateY(-1px)} .issueItem{transition:transform .12s ease, filter .12s ease}
@media(max-width:600px){#v16GpsGrid{grid-template-columns:1fr}}
`;d.head.appendChild(s);}
function gpsLevel(acc){if(acc==null)return['Accuracy unknown','#d97706','warn'];if(acc<=10)return['Good GPS','#15803d','good'];if(acc<=30)return['Usable GPS','#d97706','warn'];return['Poor GPS','#c62828','danger'];}
function gpsPanel(){const d=doc();const home=d?.getElementById('home');if(!home)return;let p=d.getElementById('v16GpsPanel');if(!p){p=d.createElement('div');p.id='v16GpsPanel';p.innerHTML='<b style="font-size:20px;color:#0d47a1">GPS Quality</b><div id="v16GpsGrid"><div id="v16GpsStatus">No GPS fix yet</div><div id="v16GpsSource">Source: none</div><div id="v16GpsAccuracy">Accuracy: missing</div><div id="v16GpsTime">Last fix: none</div><div id="v16GpsCoords" style="grid-column:1/-1">Coordinates: missing</div></div><button id="v16GetGps">Get GPS Fix</button><div id="v16GpsStrip" style="height:8px;border-radius:999px;background:#c62828;margin-top:10px"></div>';home.insertBefore(p,home.firstChild);}updateGpsPanel();const btn=d.getElementById('v16GetGps');if(btn&&!btn.dataset.v16){btn.dataset.v16='yes';btn.onclick=getGps;}const topBtn=d.getElementById('gpsBtn');if(topBtn&&!topBtn.dataset.v16){topBtn.dataset.v16='yes';topBtn.onclick=e=>{e.preventDefault();e.stopImmediatePropagation();getGps();};}}
function updateGpsPanel(){const d=doc();try{lastGps=JSON.parse(localStorage.getItem(GPS_KEY)||'null')}catch(e){lastGps=null}const statusEl=d?.getElementById('v16GpsStatus');if(!statusEl)return;if(!lastGps){d.getElementById('v16GpsStatus').textContent='No GPS fix yet';d.getElementById('v16GpsSource').textContent='Source: none';d.getElementById('v16GpsAccuracy').textContent='Accuracy: missing';d.getElementById('v16GpsTime').textContent='Last fix: none';d.getElementById('v16GpsCoords').textContent='Coordinates: missing';d.getElementById('v16GpsStrip').style.background='#c62828';return;}const [label,color]=gpsLevel(lastGps.accuracy);d.getElementById('v16GpsStatus').textContent=label;d.getElementById('v16GpsSource').textContent='Source: '+(lastGps.source||'phone');d.getElementById('v16GpsAccuracy').textContent='Accuracy: ±'+Math.round(lastGps.accuracy||0)+' m';d.getElementById('v16GpsTime').textContent='Last fix: '+new Date(lastGps.timestamp).toLocaleTimeString([], {hour12:true});d.getElementById('v16GpsCoords').textContent='Coordinates: '+Number(lastGps.lat).toFixed(6)+', '+Number(lastGps.lng).toFixed(6);d.getElementById('v16GpsStrip').style.background=color;}
function getGps(){const w=win();if(!w?.navigator?.geolocation){status('GPS not supported.','danger');return;}status('Getting GPS fix. Hold still.','info');w.navigator.geolocation.getCurrentPosition(pos=>{lastGps={lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,source:'phone',timestamp:new Date().toISOString()};localStorage.setItem(GPS_KEY,JSON.stringify(lastGps));updateGpsPanel();const [label,,tone]=gpsLevel(lastGps.accuracy);status(label+' — ±'+Math.round(lastGps.accuracy||0)+' m',tone);try{w.gps=lastGps;}catch(e){}},()=>status('GPS blocked or unavailable. Allow browser location and retry.','danger'),{enableHighAccuracy:true,maximumAge:0,timeout:15000});}
function packBanner(){const d=doc();const card=d?.querySelector('#capture .card');if(!card)return;if(!d.getElementById('v16PackBanner')){const b=d.createElement('div');b.id='v16PackBanner';b.innerHTML='<div id="v16PackTitle"></div><div id="v16PackText"></div><div id="v16PackStrip"></div>';card.insertBefore(b,card.firstChild);}const type=d.getElementById('type');if(type&&!type.dataset.v16){type.dataset.v16='yes';type.addEventListener('change',updatePack);}updatePack();}
function updatePack(){const d=doc();const type=d?.getElementById('type')?.value||'Repair';const p=PACKS[type]||PACKS.Repair;const b=d.getElementById('v16PackBanner');if(!b)return;b.style.borderColor=p[1];d.getElementById('v16PackTitle').textContent=p[0];d.getElementById('v16PackTitle').style.color=p[1];d.getElementById('v16PackText').textContent=p[2];d.getElementById('v16PackStrip').style.background=p[1];}
function openItems(){try{return JSON.parse(localStorage.getItem(OPEN_KEY)||'[]')}catch(e){return[]}}
function saveOpen(items){localStorage.setItem(OPEN_KEY,JSON.stringify(items));}
function openPicker(){const d=doc();if(!d||d.getElementById('v16Picker'))return;const o=d.createElement('div');o.id='v16Picker';o.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:16000;display:none;place-items:center;padding:18px;';o.innerHTML='<div style="width:min(620px,100%);background:#fff;border:3px solid #9ec5ff;border-radius:24px;padding:16px"><div style="font-size:22px;font-weight:1000;color:#0d47a1">Start Open Item</div><div id="v16Choices" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px"></div><button id="v16Cancel" style="margin-top:12px;width:100%;min-height:52px;border:2px solid #9ec5ff;border-radius:16px;background:#fff;color:#0d47a1;font-weight:1000">Cancel</button></div>';d.body.appendChild(o);const c=o.querySelector('#v16Choices');OPEN_CHOICES.forEach(x=>{const btn=d.createElement('button');btn.textContent=x[0];btn.style.cssText='min-height:56px;border:2px solid #9ec5ff;border-radius:16px;background:#1976d2;color:#fff;font-weight:1000;';btn.onclick=()=>{o.style.display='none';startOpen(x[1]);};c.appendChild(btn);});o.querySelector('#v16Cancel').onclick=()=>{o.style.display='none';status('Open item start cancelled.','info');};}
function showPicker(){openPicker();doc().getElementById('v16Picker').style.display='grid';}
function startOpen(type){const items=openItems();const prefix=type==='Repair'?'R':type==='Panel'?'P':type==='Seam'?'S':type==='Air Test'?'AT':type==='DT Patch'?'DTP':type==='Retest'?'RT':'OPEN';const number=prefix+'-OPEN-'+String(items.length+1).padStart(3,'0');items.push({id:Date.now(),type,number,startedAt:new Date().toISOString(),gps:lastGps,status:'OPEN'});saveOpen(items);renderOpenItems();status('Started open item: '+type+' '+number,'good');}
function renderOpenItems(){const d=doc();const box=d?.getElementById('openItems');if(!box)return;const items=openItems();if(!items.length){box.innerHTML='<div class="item">No open items</div>';return;}box.innerHTML='';items.slice().reverse().forEach(i=>{const e=d.createElement('div');e.className='item';e.innerHTML='<b>'+i.type+' — '+i.number+'</b><div class="itemMeta">Started '+new Date(i.startedAt).toLocaleString([], {hour12:true})+' | Status OPEN</div>';box.appendChild(e);});}
function finishOpen(){const items=openItems();if(!items.length){status('No open item to finish. Start one first, or keep logging.','info');return;}const item=items.pop();saveOpen(items);const d=doc();tab('capture');setTimeout(()=>{const map=item.type==='DT Patch'?'Repair':item.type==='Retest'?'Wedge Test':item.type==='Other'?'Repair':item.type;const type=d.getElementById('type');if(type){type.value=map;type.dispatchEvent(new Event('change',{bubbles:true}));}const num=d.getElementById('number');if(num)num.value=item.number;const notes=d.getElementById('notes');if(notes)notes.value=(notes.value?notes.value+'\n':'')+'Finished open item: '+item.type+'.';updatePack();renderOpenItems();status('Loaded '+item.type+' '+item.number+' into Capture.','good');},250);}
function wireOpenButtons(){const d=doc();const start=d?.getElementById('startItem'),finish=d?.getElementById('finishItem');if(start&&!start.dataset.v16){start.dataset.v16='yes';start.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();showPicker();},true);}if(finish&&!finish.dataset.v16){finish.dataset.v16='yes';finish.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();finishOpen();},true);}openPicker();renderOpenItems();}
function focusField(id){const e=doc()?.getElementById(id);if(e){setTimeout(()=>{e.scrollIntoView({behavior:'smooth',block:'center'});e.focus();e.style.outline='5px solid #22c55e';setTimeout(()=>e.style.outline='',2500);},250);}}
function jump(text){const t=(text||'').replace('TAP TO FIX','').toLowerCase();if(t.includes('open workflow')){tab('capture');setTimeout(()=>doc()?.getElementById('openItems')?.scrollIntoView({behavior:'smooth',block:'center'}),250);return;}if(t.includes('roll')){tab('setup');focusField('roll');return;}if(t.includes('cell')||t.includes('pond')||t.includes('lagoon')){tab('setup');focusField('cell');return;}if(t.includes('no logs')){tab('capture');return;}if(t.includes('gps')){tab('home');setTimeout(()=>doc()?.getElementById('v16GpsPanel')?.scrollIntoView({behavior:'smooth',block:'center'}),250);return;}tab('capture');}
function cleanHome(){const d=doc();if(!d)return;const next=d.getElementById('nextAction');const critical=count('kCritical');if(next){next.textContent=critical>0?'Fix-now items are below. Review-later cleanup is stored for End-of-Day / Export.':'No critical issues. Keep logging QC.';next.className=critical>0?'warnBox':'okBox';}
 const headers=qa('.cardTitle');const review=headers.find(h=>/^review later/i.test(h.textContent||''));if(review){let n=review.nextElementSibling;while(n){const nx=n.nextElementSibling;if(n.classList?.contains('cardTitle')||/Fast Workflow/i.test(n.textContent||''))break;n.remove();n=nx;}review.remove();}
 const crit=headers.find(h=>/critical now/i.test(h.textContent||''));if(crit){crit.textContent='Critical Now — Fix These First';let items=[];let n=crit.nextElementSibling;while(n&&!n.classList?.contains('cardTitle')){if(n.classList?.contains('issueItem'))items.push(n);items.push(...Array.from(n.querySelectorAll?.('.issueItem')||[]));n=n.nextElementSibling;}items.forEach((x,i)=>{if(i>2)x.remove();else if(!x.dataset.v16){x.dataset.v16='yes';x.style.cursor='pointer';x.style.position='relative';x.style.paddingRight='110px';const tag=d.createElement('span');tag.textContent='TAP TO FIX';tag.style.cssText='position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:1000;background:#0d47a1;color:#fff;border-radius:999px;padding:5px 8px;pointer-events:none;';x.appendChild(tag);x.addEventListener('click',()=>jump(x.textContent||''));}});}}
function eod(){const d=doc();const home=d?.getElementById('home'),exp=d?.getElementById('export');if(home&&!d.getElementById('v16HomeEodCard')){const card=d.createElement('div');card.id='v16HomeEodCard';card.className='card';card.innerHTML='<div class="cardTitle">End-of-Day Review</div><div id="v16HomeEodText" class="okBox"></div><button id="v16OpenEod">Open End-of-Day Review</button>';const fast=Array.from(home.querySelectorAll('.card')).find(c=>/Fast Workflow/i.test(c.textContent||''));home.insertBefore(card,fast||null);d.getElementById('v16OpenEod').onclick=()=>{tab('export');status('Opened End-of-Day Review.','info');};}const text=d?.getElementById('v16HomeEodText');if(text)text.textContent=count('kReview')+' review-later item(s) stored for end-of-day cleanup.';if(exp&&!d.getElementById('v16EodPanel')){const p=d.createElement('div');p.id='v16EodPanel';p.className='card';p.innerHTML='<div class="cardTitle">End-of-Day Review</div><div id="v16EodStatus" class="warnBox"></div><div id="v16EodList"></div><button id="v16RefreshEod">Refresh Review List</button>';exp.insertBefore(p,exp.firstChild);}const st=d?.getElementById('v16EodStatus');if(st)st.textContent=count('kReview')+' review-later item(s) to check before leaving site.';const list=d?.getElementById('v16EodList');const exportStatus=d?.getElementById('exportStatus');if(list&&exportStatus){const lis=Array.from(exportStatus.querySelectorAll('li')).map(li=>li.textContent||'').filter(t=>/review|photo|cell|roll|missing|technician|station|override/i.test(t)).slice(0,20);list.innerHTML=lis.length?lis.map((t,i)=>'<div class="item"><b>'+(i+1)+'. Review Later</b><div class="itemMeta">'+t+'</div></div>').join(''):'<div class="item"><b>No review-later items listed.</b></div>';}}
function inject(){const d=doc(),w=win();if(!d||!w)return;loading.style.display='none';stableHeader();installStyle();gpsPanel();packBanner();wireOpenButtons();cleanHome();eod();if(!w.__v16Alert){w.__v16Alert=true;w.alert=m=>status(String(m||'Notice.'),'info');}}
frame.addEventListener('load',()=>{setTimeout(inject,700);setTimeout(inject,1500);setInterval(inject,900);});
</script>
</body>
</html>
