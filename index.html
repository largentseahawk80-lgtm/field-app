<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LinerSync Repair Points</title>
  <meta name="theme-color" content="#0b1220" />
  <style>
    :root{
      --bg:#0b1220; --panel:#121c31; --text:#eaf1ff; --muted:#9fb2d8;
      --green:#22c55e; --blue:#38bdf8; --red:#ef4444; --line:#29406f; --gold:#facc15; --purple:#c084fc; --teal:#2dd4bf;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .app{display:grid;grid-template-rows:auto 1fr auto;height:100%}
    .top{padding:10px;background:linear-gradient(180deg,#0f1830,#0b1220);border-bottom:1px solid var(--line)}
    .title{font-size:28px;font-weight:800;text-align:center;margin:4px 0 6px}
    .status{font-size:15px;color:var(--muted);margin-bottom:8px;text-align:center}
    .taskbar,.backupbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .startTask{background:var(--green)}
    .endTask{background:var(--blue)}
    .backupNow{background:var(--teal)}
    .restoreBtn{background:var(--gold)}
    .typebar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .typebtn{border:1px solid var(--line);border-radius:16px;padding:14px 10px;font-size:16px;font-weight:800;color:var(--text);background:#16233e;cursor:pointer}
    .typebtn.active{outline:3px solid rgba(250,204,21,.35);background:#22345b}
    .captureRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
    button{border:0;border-radius:18px;padding:18px 12px;font-size:18px;font-weight:800;color:#07111f;cursor:pointer}
    .capture{background:var(--green)}
    .download{background:var(--blue)}
    .exports{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .export{padding:12px 8px;font-size:14px}
    .csv{background:var(--blue)}
    .geojson{background:var(--gold)}
    .kml{background:var(--purple)}
    .clear{background:var(--red);color:white;padding:10px 14px;font-size:14px}
    #map{height:100%;width:100%}
    .bottom{padding:10px;background:linear-gradient(0deg,#0f1830,#0b1220);border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center}
    .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-weight:700}
    .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .hidden{display:none !important}
    input[type=file]{display:none}
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title">LinerSync Repair Points</div>
    <div id="perm" class="status">Tap Start Task to begin repair logging</div>
    <div class="taskbar">
      <button class="startTask" id="startTaskBtn">Start Task</button>
      <button class="endTask" id="endTaskBtn">End Task</button>
    </div>
    <div class="backupbar">
      <button class="backupNow" id="backupBtn">Backup Now</button>
      <button class="restoreBtn" id="restoreBtn">Restore Backup</button>
      <input type="file" id="restoreInput" accept=".json,application/json">
    </div>
    <div class="typebar hidden" id="typebar">
      <button class="typebtn active" id="beadBtn">Bead</button>
      <button class="typebtn" id="patchBtn">Patch</button>
    </div>
    <div class="captureRow hidden" id="captureRow">
      <button class="capture" id="captureBtn">Capture Repair</button>
      <button class="download" id="fitBtn">Fit Field Map</button>
    </div>
    <div class="exports" id="exports">
      <button class="export csv" id="csvBtn">CSV</button>
      <button class="export geojson" id="geojsonBtn">GeoJSON</button>
      <button class="export kml" id="kmlBtn">KML</button>
    </div>
  </div>

  <div id="map"></div>

  <div class="bottom">
    <div class="pill" id="countPill">Points: 0</div>
    <div class="actions">
      <div class="pill" id="taskPill">Task: Off</div>
      <div class="pill" id="typePill">Type: Bead</div>
      <div class="pill" id="backupPill">Backup: Local only</div>
      <button class="clear" id="clearBtn">Clear</button>
      <div class="pill" id="gpsPill">GPS: Waiting</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
<script>
const STORAGE_KEY = "linersync-repair-points-v7";
const LEGACY_KEYS = [
  "linersync-repair-points-v7",
  "linersync-repair-points-v6",
  "linersync-repair-points-v5",
  "linersync-repair-points-v4",
  "linersync-repair-points-v3",
  "linersync-simple-points-v2",
  "linersync-simple-points-v1",
  "linersync-simple-points-local-v2"
];

function loadPoints(){
  for(const key of LEGACY_KEYS){
    try{
      const raw = localStorage.getItem(key);
      if(!raw) continue;
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed)){
        if(key !== STORAGE_KEY) localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
        return parsed;
      }
    }catch(e){}
  }
  return [];
}

let points = loadPoints();
let map, markersLayer, trailLayer, currentMarker = null, accuracyCircle = null, lastPos = null;
let repairType = "Bead";
let taskActive = false;

function savePoints(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(points));
  document.getElementById("countPill").textContent = `Points: ${points.length}`;
}
function setBackupStatus(text){ document.getElementById("backupPill").textContent = `Backup: ${text}`; }
function updateTaskUI(){
  document.getElementById("taskPill").textContent = `Task: ${taskActive ? "On" : "Off"}`;
  document.getElementById("typebar").classList.toggle("hidden", !taskActive);
  document.getElementById("captureRow").classList.toggle("hidden", !taskActive);
  document.getElementById("startTaskBtn").textContent = taskActive ? "Task Started" : "Start Task";
}
function updateTypeUI(){
  document.getElementById("typePill").textContent = `Type: ${repairType}`;
  document.getElementById("beadBtn").classList.toggle("active", repairType === "Bead");
  document.getElementById("patchBtn").classList.toggle("active", repairType === "Patch");
}
function formatTime(ts){ return new Date(ts).toLocaleString([], {year:"numeric", month:"2-digit", day:"2-digit", hour:"numeric", minute:"2-digit", second:"2-digit", hour12:true}); }
function isoTime(ts){ return new Date(ts).toISOString(); }
function xmlEscape(s){ return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c])); }
function typeIndex(t){ return points.filter(p => (p.repair_type || "Bead") === t).length; }
function nextRepairId(t){ return `${t === "Bead" ? "B" : "P"}-${String(typeIndex(t) + 1).padStart(3,"0")}`; }
function markerColor(type){ return type === "Patch" ? "#c084fc" : "#facc15"; }

function normalizePoint(p, i){
  return {
    id: p.id || String(Date.now()+i),
    repair_id: p.repair_id || p.id_label || `P-${String(i+1).padStart(3,"0")}`,
    repair_type: p.repair_type || "Bead",
    lat: Number(p.lat),
    lng: Number(p.lng),
    accuracy: Number(p.accuracy || 0),
    timestamp: p.timestamp || Date.now()
  };
}
points = points.map(normalizePoint).filter(p => Number.isFinite(p.lat) && Number.isFinite(p.lng));

function getAllVisibleLatLngs(){
  const latlngs = points.map(p => [p.lat, p.lng]);
  if(lastPos && Number.isFinite(lastPos.lat) && Number.isFinite(lastPos.lng)) latlngs.push([lastPos.lat, lastPos.lng]);
  return latlngs;
}

function fitFieldMap(){
  const latlngs = getAllVisibleLatLngs();
  if(!latlngs.length) return;
  if(latlngs.length === 1){
    map.setView(latlngs[0], 19);
    return;
  }
  map.fitBounds(L.latLngBounds(latlngs), {padding:[35,35]});
}

function redrawTrail(){
  trailLayer.clearLayers();
  if(points.length >= 2){
    L.polyline(points.map(p => [p.lat, p.lng]), {color:'#38bdf8', weight:3, opacity:0.85}).addTo(trailLayer);
  }
}

function renderPoints(){
  markersLayer.clearLayers();
  redrawTrail();
  points.forEach((p, i) => {
    const marker = L.circleMarker([p.lat, p.lng], {radius: 7, color: "#0b1220", weight: 1, fillColor: markerColor(p.repair_type || "Bead"), fillOpacity: 0.95}).addTo(markersLayer);
    marker.bindPopup(`
      <b>${xmlEscape(p.repair_id || `Point ${i+1}`)}</b><br>
      Type: ${xmlEscape(p.repair_type || "Bead")}<br>
      Lat: ${p.lat.toFixed(7)}<br>
      Lng: ${p.lng.toFixed(7)}<br>
      Accuracy: ${Math.round(p.accuracy || 0)} m<br>
      Time: ${xmlEscape(formatTime(p.timestamp))}
    `);
  });
  savePoints();
}

function setGps(text, ok=true){ const el = document.getElementById("gpsPill"); el.textContent = `GPS: ${text}`; el.style.borderColor = ok ? "#29406f" : "#6b1f1f"; }
function setPerm(text){ document.getElementById("perm").textContent = text; }

function initMap(){
  map = L.map('map');
  trailLayer = L.layerGroup().addTo(map);
  markersLayer = L.layerGroup().addTo(map);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 22, attribution: '&copy; OpenStreetMap contributors'}).addTo(map);
  renderPoints();
  updateTaskUI();
  updateTypeUI();
  setBackupStatus("Local only");
  if(points.length){ setPerm(`Recovered ${points.length} saved points.`); fitFieldMap(); } else { map.setView([33.3943, -104.5230], 5); }
}

function drawCurrentPosition(){
  if(!lastPos) return;
  const latlng = [lastPos.lat, lastPos.lng];
  if(currentMarker){ currentMarker.setLatLng(latlng); }
  else {
    currentMarker = L.circleMarker(latlng, {radius: 9, color:'#ffffff', weight:2, fillColor:'#38bdf8', fillOpacity:1}).addTo(map);
    currentMarker.bindPopup('Current GPS location');
  }
  if(accuracyCircle){ accuracyCircle.setLatLng(latlng); accuracyCircle.setRadius(Math.max(1, lastPos.accuracy || 1)); }
  else {
    accuracyCircle = L.circle(latlng, {radius: Math.max(1, lastPos.accuracy || 1), color:'#38bdf8', weight:1, fillColor:'#38bdf8', fillOpacity:0.12}).addTo(map);
  }
}

function updateLivePosition(position){
  const { latitude, longitude, accuracy } = position.coords;
  lastPos = { lat: latitude, lng: longitude, accuracy, timestamp: Date.now() };
  setGps(`${Math.round(accuracy)}m`, true);
  if(taskActive) setPerm(`Task running: ${repairType} | Current + captures visible on map`);
  else setPerm("Field map shows current GPS and saved captures");
  drawCurrentPosition();
  if(taskActive || points.length) fitFieldMap();
}

function startGps(){
  if(!("geolocation" in navigator)){ setGps("Not supported", false); setPerm("This phone/browser does not support GPS"); return; }
  navigator.geolocation.getCurrentPosition(
    pos => { updateLivePosition(pos); if(!points.length) map.setView([pos.coords.latitude, pos.coords.longitude], 19); },
    err => { setGps("Error", false); setPerm("Allow location permission in Chrome and reload"); console.error(err); },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
  navigator.geolocation.watchPosition(updateLivePosition, err => { setGps("Error", false); console.error(err); }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 1000 });
}

function startTask(){ taskActive = true; updateTaskUI(); updateTypeUI(); setPerm(`Task running: ${repairType} | Current + captures visible on map`); fitFieldMap(); }
function endTask(){ taskActive = false; updateTaskUI(); setPerm("Task ended. Field map still shows current GPS and saved captures."); fitFieldMap(); }

function capturePoint(){
  if(!taskActive){ alert("Tap Start Task first."); return; }
  if(!lastPos){ alert("GPS not ready yet. Allow location, wait a few seconds, then tap again."); return; }
  const rid = prompt(`${repairType} ID`, nextRepairId(repairType)) || nextRepairId(repairType);
  points.push({ id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()), repair_id: rid, repair_type: repairType, lat: lastPos.lat, lng: lastPos.lng, accuracy: lastPos.accuracy, timestamp: Date.now() });
  renderPoints();
  fitFieldMap();
}

function buildBackup(){ return { app: "LinerSync Repair Points", version: 7, exported_at: new Date().toISOString(), points }; }
function downloadFile(name, content, type){ const blob = new Blob([content], { type }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = name; a.click(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
function backupNow(){ const stamp = new Date().toISOString().replace(/[:.]/g, "-"); downloadFile(`linersync-backup-${stamp}.json`, JSON.stringify(buildBackup(), null, 2), "application/json"); setBackupStatus("JSON saved"); setPerm("Backup file downloaded to your phone. Use Restore Backup to pick it later."); }

function restoreFromFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const restored = Array.isArray(data) ? data : Array.isArray(data.points) ? data.points : null;
      if(!restored) throw new Error("Invalid backup format");
      points = restored.map(normalizePoint).filter(p => Number.isFinite(p.lat) && Number.isFinite(p.lng));
      renderPoints();
      fitFieldMap();
      setBackupStatus("Restored");
      setPerm(`Restored ${points.length} points from backup.`);
    } catch (err) {
      alert("Backup file could not be restored.");
      console.error(err);
    }
  };
  reader.readAsText(file);
}

function buildGeoJSON(){
  return { type: "FeatureCollection", features: points.map((p, i) => ({ type: "Feature", properties: { point_no: i + 1, repair_id: p.repair_id || `Point ${i+1}`, repair_type: p.repair_type || "Bead", accuracy_m: Math.round(p.accuracy || 0), timestamp: isoTime(p.timestamp), local_time: formatTime(p.timestamp) }, geometry: { type: "Point", coordinates: [p.lng, p.lat] } })) };
}
function buildCSV(){ return ["point_no,repair_id,repair_type,latitude,longitude,accuracy_m,timestamp_iso,local_time", ...points.map((p, i) => [i + 1, p.repair_id || `Point ${i+1}`, p.repair_type || "Bead", p.lat, p.lng, Math.round(p.accuracy || 0), isoTime(p.timestamp), `\"${formatTime(p.timestamp)}\"`].join(","))].join("\n"); }
function buildKML(){
  const placemarks = points.map((p, i) => `\n    <Placemark>\n      <name>${xmlEscape(p.repair_id || `Point ${i+1}`)}</name>\n      <description>${xmlEscape(`Type ${p.repair_type || "Bead"} | Accuracy ${Math.round(p.accuracy || 0)} m | ${formatTime(p.timestamp)}`)}</description>\n      <styleUrl>#${p.repair_type === "Patch" ? "patchStyle" : "beadStyle"}</styleUrl>\n      <Point><coordinates>${p.lng},${p.lat},0</coordinates></Point>\n    </Placemark>`).join("");
  return `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n  <Document>\n    <name>LinerSync Repair Points</name>\n    <Style id="beadStyle"><IconStyle><color>ff00ffff</color><scale>1.1</scale></IconStyle><LabelStyle><scale>1.0</scale></LabelStyle></Style>\n    <Style id="patchStyle"><IconStyle><color>ffff00ff</color><scale>1.1</scale></IconStyle><LabelStyle><scale>1.0</scale></LabelStyle></Style>${placemarks}\n  </Document>\n</kml>`;
}
function downloadCSV(){ if(!points.length){ alert("No points captured yet."); return; } const stamp = new Date().toISOString().replace(/[:.]/g, "-"); downloadFile(`linersync-repairs-${stamp}.csv`, buildCSV(), "text/csv"); }
function downloadGeoJSON(){ if(!points.length){ alert("No points captured yet."); return; } const stamp = new Date().toISOString().replace(/[:.]/g, "-"); downloadFile(`linersync-repairs-${stamp}.geojson`, JSON.stringify(buildGeoJSON(), null, 2), "application/geo+json"); }
function downloadKML(){ if(!points.length){ alert("No points captured yet."); return; } const stamp = new Date().toISOString().replace(/[:.]/g, "-"); downloadFile(`linersync-repairs-${stamp}.kml`, buildKML(), "application/vnd.google-earth.kml+xml"); setPerm("KML downloaded. In Google Earth, import the KML file from your device."); }
function clearPoints(){ if(!confirm("Delete all saved points on this phone?")) return; points = []; renderPoints(); setBackupStatus("Local only"); fitFieldMap(); }

document.getElementById("startTaskBtn").addEventListener("click", startTask);
document.getElementById("endTaskBtn").addEventListener("click", endTask);
document.getElementById("backupBtn").addEventListener("click", backupNow);
document.getElementById("restoreBtn").addEventListener("click", ()=>document.getElementById("restoreInput").click());
document.getElementById("restoreInput").addEventListener("change", (e)=>{ if(e.target.files && e.target.files[0]) restoreFromFile(e.target.files[0]); e.target.value = ""; });
document.getElementById("beadBtn").addEventListener("click", ()=>{ repairType = "Bead"; updateTypeUI(); if(taskActive) setPerm(`Task running: ${repairType} | Current + captures visible on map`); });
document.getElementById("patchBtn").addEventListener("click", ()=>{ repairType = "Patch"; updateTypeUI(); if(taskActive) setPerm(`Task running: ${repairType} | Current + captures visible on map`); });
document.getElementById("captureBtn").addEventListener("click", capturePoint);
document.getElementById("fitBtn").addEventListener("click", fitFieldMap);
document.getElementById("csvBtn").addEventListener("click", downloadCSV);
document.getElementById("geojsonBtn").addEventListener("click", downloadGeoJSON);
document.getElementById("kmlBtn").addEventListener("click", downloadKML);
document.getElementById("clearBtn").addEventListener("click", clearPoints);

initMap();
startGps();
</script>
</body>
</html>
