<!DOCTYPE html><html lang="en"><head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="theme-color" content="#020617"/>
    <title>LinerSync SuperApp v2</title>
    <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:linear-gradient(145deg,#080c18 0%,#0c1526 40%,#111d35 100%);color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
    input,select{width:100%;background:rgba(30,41,59,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(148,163,184,.15);border-radius:14px;padding:14px;color:#f8fafc;font-size:16px;font-weight:600;outline:none;-webkit-appearance:none;font-family:inherit;min-height:52px;transition:border-color .2s}
    input:focus,select:focus{border-color:rgba(96,165,250,.6);box-shadow:0 0 20px rgba(59,130,246,.15)}
    button{border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit;min-height:48px}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(148,163,184,.2);border-radius:4px}
    @keyframes spin{to{transform:rotate(360deg)}}
    </style>
    </head><body><div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script>
    "use strict";
    const h=React.createElement,{useState,useEffect,useMemo,useCallback,useRef}=React,F=React.Fragment;
    
    const SK="ls9";
    function sLoad(){
      let d=tp(SK);if(d)return d;
      for(const k of["ls8","linersync-v7"]){d=tp(k);if(d){localStorage.setItem(SK,JSON.stringify(d));return d;}}
      return null;
    }
    function sSave(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}
    function tp(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
    
    const uid=()=>`${Date.now()}-${Math.random().toString(36).substr(2,9)}`;
    const td=()=>new Date().toISOString().split("T")[0];
    const nw=()=>{const d=new Date();return d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0')};
    const fn=n=>n?n.toLocaleString():"0";
    const EMPTY={panels:[],seams:[],airTests:[],trialWelds:[],dTests:[],vacuums:[],perimeter:[],captures:[],dronePhotos:[]};
    
    function calcDT(seams, dTests, interval) {
      const totalFt = seams.reduce((a, s) => a + (Number(s.len) || 0), 0);
      const dtCount = dTests.length;
      const threshold = (dtCount + 1) * interval;
      const remaining = threshold - totalFt;
      const due = totalFt >= threshold;
      const overdue = due ? totalFt - threshold : 0;
      return { totalFt, dtCount, due, remaining, overdue };
    }
    
    function useGPS(){
      const[g,setG]=useState({lat:null,lng:null,acc:null,status:"init"});
      const wr=useRef(null);
      const start=useCallback(()=>{
        if(!navigator.geolocation)return;
        if(wr.current!==null)navigator.geolocation.clearWatch(wr.current);
        wr.current=navigator.geolocation.watchPosition(
          p=>setG({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy,status:"locked"}),
          e=>setG(p=>({...p,status:"error"})),{enableHighAccuracy:true,timeout:10000,maximumAge:0});
      },[]);
      useEffect(()=>{start();return()=>{if(wr.current!==null)navigator.geolocation.clearWatch(wr.current)}},[start]);
      return{...g,stamp:()=>g.lat?{lat:g.lat,lng:g.lng,acc:g.acc}:null};
    }
    
    function YellowGPSBar({gps}){
      const isLocked = gps.status === "locked";
      return h("div", {style: {background: isLocked ? "#facc15" : "#ef4444", color: "#000", padding: "6px 10px", fontSize: "11px", fontWeight: "900", textAlign: "center", display: "flex", justifyContent: "center", gap: "15px", borderBottom: "1.5px solid #000", zIndex: 100}},
        h("span", null, isLocked ? "📍 GPS ACTIVE" : "🛰 SEARCHING GPS..."),
        isLocked && h("span", null, "LAT: " + gps.lat.toFixed(6)),
        isLocked && h("span", null, "LNG: " + gps.lng.toFixed(6))
      );
    }
    
    function App(){
      const[store,setStore]=useState(()=>sLoad()||{projects:[],active:null});
      const gps=useGPS();
      const persist=n=>{setStore(n);sSave(n)};
      if(!store.active) return h(Home,{store,persist});
      const proj = store.projects.find(p=>p.id===store.active);
      return h(ProjView,{proj,store,persist,gps});
    }
    
    function Home({store,persist}){
      const add=()=>{
        const name=prompt("Project Name?");if(!name)return;
        const np={id:uid(),name,area:"Site A",material:"60-mil HDPE",data:{...EMPTY},specs:{dtInterval:500}};
        persist({projects:[...store.projects,np],active:np.id});
      };
      return h("div",{style:{padding:20,textAlign:"center"}},
        h("h1",{style:{marginTop:40,fontSize:32, color:"#f8fafc"}},"LinerSync"),
        store.projects.map(p=>h("button",{key:p.id,onClick:()=>persist({...store,active:p.id}),style:{background:"#1e293b",color:"#fff",width:"100%",padding:20,borderRadius:15,marginBottom:10,textAlign:"left", border:"1px solid #334155"}},p.name)),
        h("button",{onClick:add,style:{background:"#3b82f6",color:"#fff",width:"100%",padding:20,borderRadius:15,marginTop:20,fontWeight:700}},"+ NEW PROJECT")
      );
    }
    
    function ProjView({proj,store,persist,gps}){
      const[tab,setTab]=useState("tests");
      const d = proj.data;
      const up=nd=>persist({...store,projects:store.projects.map(p=>p.id===proj.id?{...p,data:nd}:p)});
      const dtStats = useMemo(()=>calcDT(d.seams, d.dTests, proj.specs?.dtInterval || 500), [d.seams, d.dTests, proj.specs]);
      return h("div",{style:{display:"flex",flexDirection:"column",height:"100vh"}},
        h(YellowGPSBar,{gps}),
        h("div",{style:{padding:10,background:"#020617",display:"flex",justifyContent:"space-between",alignItems:"center", borderBottom:"1px solid #1e293b"}},
           h("button",{onClick:()=>persist({...store,active:null}),style:{color:"#60a5fa",background:"none", fontWeight:"700"}},"← PROJECTS"),
           h("b",{style:{color:"#f8fafc"}},proj.name),
           h("div",null)
        ),
        h("div",{style:{flex:1,overflowY:"auto",padding:15}},
          h("div",{style:{background: dtStats.due ? "rgba(220,38,38,0.2)" : "rgba(74,222,128,0.1)", border:"1.5px solid " + (dtStats.due ? "#ef4444" : "#4ade80"), borderRadius:16, padding:15, marginBottom:20}},
            h("div",{style:{display:"flex", justifyContent:"space-between", alignItems:"center"}},
              h("div",null,
                h("p",{style:{fontSize:10, fontWeight:800, color:"#94a3b8"}},"WELD FOOTAGE"),
                h("p",{style:{fontSize:18, fontWeight:900, color:"#f8fafc"}},fn(dtStats.totalFt) + "' total")),
              h("div",{style:{textAlign:"right"}},
                dtStats.due ? h(F,null, h("p",{style:{color:"#ef4444", fontWeight:900}},"⚠ DT OVERDUE"), h("p",{style:{fontSize:10, color:"#ef4444"}},fn(dtStats.overdue)+"' past due")) 
                : h(F,null, h("p",{style:{color:"#4ade80", fontWeight:900}},"NEXT DT IN"), h("p",{style:{fontSize:20, fontWeight:900, color:"#4ade80"}},fn(dtStats.remaining)+"'"))
              )
            )
          ),
          h("button",{onClick:()=>{
            const num = prompt("Seam Number?"); if(!num) return;
            const len = prompt("Length in feet?"); if(!len) return;
            up({...d, seams:[...d.seams, {id:uid(), num, len:Number(len), date:td()}]});
          }, style:{background:"#3b82f6", color:"#fff", width:"100%", padding:15, borderRadius:12, fontWeight:700, marginBottom:10}}, "+ LOG NEW WELD"),
          h("button",{onClick:()=>{
            const num = prompt("DT Number?"); if(!num) return;
            up({...d, dTests:[...d.dTests, {id:uid(), dtNum:num, date:td()}]});
          }, style:{background:"#1e293b", color:"#fff", width:"100%", padding:15, borderRadius:12, fontWeight:700, border:"1px solid #334155"}}, "+ LOG DT TEST")
        )
      );
    }
    ReactDOM.render(h(App),document.getElementById("root"));
    </script></body></html>
