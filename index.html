<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LinerSync Simple Points</title>
  <meta name="theme-color" content="#0b1220" />
  <style>
    :root{
      --bg:#0b1220; --panel:#121c31; --text:#eaf1ff; --muted:#9fb2d8;
      --green:#22c55e; --blue:#38bdf8; --red:#ef4444; --line:#29406f;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .app{display:grid;grid-template-rows:auto 1fr auto;height:100%}
    .top{padding:10px;background:linear-gradient(180deg,#0f1830,#0b1220);border-bottom:1px solid var(--line)}
    .title{font-size:28px;font-weight:800;text-align:center;margin:4px 0 10px}
    .status{font-size:15px;color:var(--muted);margin-bottom:8px}
    .buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    button{border:0;border-radius:18px;padding:20px 12px;font-size:18px;font-weight:800;color:#07111f;cursor:pointer}
    .capture{background:var(--green)}
    .download{background:var(--blue)}
    .clear{background:var(--red);color:white;padding:10px 14px;font-size:14px}
    #map{height:100%;width:100%}
    .bottom{padding:10px;background:linear-gradient(0deg,#0f1830,#0b1220);border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center}
    .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-weight:700}
    .actions{display:flex;gap:8px;align-items:center}
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title">LinerSync Simple Points</div>
    <div id="perm" class="status">Tap allow location permission</div>
    <div class="buttons">
      <button class="capture" id="captureBtn">Tap to Capture</button>
      <button class="download" id="downloadBtn">Download Points</button>
    </div>
  </div>

  <div id="map"></div>

  <div class="bottom">
    <div class="pill" id="countPill">Points: 0</div>
    <div class="actions">
      <button class="clear" id="clearBtn">Clear</button>
      <div class="pill" id="gpsPill">GPS: Waiting</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
<script>
const STORAGE_KEY = "linersync-simple-points-v1";
let points = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let map, markersLayer, currentMarker = null, lastPos = null;

function savePoints(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(points));
  document.getElementById("countPill").textContent = `Points: ${points.length}`;
}

function formatTime(ts){
  return new Date(ts).toLocaleString([], {
    year:"numeric", month:"2-digit", day:"2-digit",
    hour:"numeric", minute:"2-digit", second:"2-digit", hour12:true
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function renderPoints(){
  markersLayer.clearLayers();
  points.forEach((p, i) => {
    const marker = L.marker([p.lat, p.lng]).addTo(markersLayer);
    marker.bindPopup(`
      <b>Point ${i + 1}</b><br>
      Lat: ${p.lat.toFixed(7)}<br>
      Lng: ${p.lng.toFixed(7)}<br>
      Accuracy: ${Math.round(p.accuracy || 0)} m<br>
      Time: ${escapeHtml(formatTime(p.timestamp))}
    `);
  });
  savePoints();
}

function setGps(text, ok=true){
  const el = document.getElementById("gpsPill");
  el.textContent = `GPS: ${text}`;
  el.style.borderColor = ok ? "#29406f" : "#6b1f1f";
}

function setPerm(text){
  document.getElementById("perm").textContent = text;
}

function initMap(){
  map = L.map('map');
  markersLayer = L.layerGroup().addTo(map);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 22,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  renderPoints();

  if(points.length){
    const group = L.featureGroup(points.map(p => L.marker([p.lat, p.lng])));
    map.fitBounds(group.getBounds().pad(0.2));
  } else {
    map.setView([33.3943, -104.5230], 5);
  }
}

function updateLivePosition(position){
  const { latitude, longitude, accuracy } = position.coords;
  lastPos = { lat: latitude, lng: longitude, accuracy, timestamp: Date.now() };
  setGps(`${Math.round(accuracy)}m`, true);
  setPerm("Location permission allowed");

  if(currentMarker){
    currentMarker.setLatLng([latitude, longitude]);
  } else {
    currentMarker = L.circleMarker([latitude, longitude], { radius: 8 }).addTo(map);
  }
}

function startGps(){
  if(!("geolocation" in navigator)){
    setGps("Not supported", false);
    setPerm("This phone/browser does not support GPS");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      updateLivePosition(pos);
      map.setView([pos.coords.latitude, pos.coords.longitude], 19);
    },
    err => {
      setGps("Error", false);
      setPerm("Allow location permission in Chrome and reload");
      console.error(err);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );

  navigator.geolocation.watchPosition(
    updateLivePosition,
    err => {
      setGps("Error", false);
      console.error(err);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 1000 }
  );
}

function capturePoint(){
  if(!lastPos){
    alert("GPS not ready yet. Allow location, wait a few seconds, then tap again.");
    return;
  }
  points.push({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    lat: lastPos.lat,
    lng: lastPos.lng,
    accuracy: lastPos.accuracy,
    timestamp: Date.now()
  });
  renderPoints();
}

function downloadFile(name, content, type){
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function downloadPoints(){
  if(!points.length){
    alert("No points captured yet.");
    return;
  }

  const stamp = new Date().toISOString().replace(/[:.]/g, "-");
  const geojson = {
    type: "FeatureCollection",
    features: points.map((p, i) => ({
      type: "Feature",
      properties: {
        point_no: i + 1,
        accuracy_m: Math.round(p.accuracy || 0),
        timestamp: new Date(p.timestamp).toISOString(),
        local_time: formatTime(p.timestamp)
      },
      geometry: { type: "Point", coordinates: [p.lng, p.lat] }
    }))
  };

  const csvRows = [
    "point_no,latitude,longitude,accuracy_m,timestamp_iso,local_time",
    ...points.map((p, i) =>
      [i + 1, p.lat, p.lng, Math.round(p.accuracy || 0), new Date(p.timestamp).toISOString(), `\"${formatTime(p.timestamp)}\"`].join(",")
    )
  ];

  downloadFile(`linersync-points-${stamp}.geojson`, JSON.stringify(geojson, null, 2), "application/geo+json");
  setTimeout(() => {
    downloadFile(`linersync-points-${stamp}.csv`, csvRows.join("\n"), "text/csv");
  }, 250);
}

function clearPoints(){
  if(!confirm("Delete all saved points on this phone?")) return;
  points = [];
  renderPoints();
}

document.getElementById("captureBtn").addEventListener("click", capturePoint);
document.getElementById("downloadBtn").addEventListener("click", downloadPoints);
document.getElementById("clearBtn").addEventListener("click", clearPoints);

initMap();
startGps();
</script>
</body>
</html>
